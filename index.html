<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#fffdf7">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192x192.png">
<title>Польські слова</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap');

:root {
  --bg: #f5f0e8;
  --card-bg: #fffdf7;
  --text: #2c2418;
  --text-light: #7a6e5d;
  --accent: #c0392b;
  --green: #27ae60;
  --border: #e0d8c8;
  --shadow: rgba(44, 36, 24, 0.08);
  --shadow-strong: rgba(44, 36, 24, 0.15);
  --card-flip: #faf6ee;
  --blue: #3498db;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html { height: 100%; overflow: hidden; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  height: 100%;
  line-height: 1.5;
  overflow: hidden;
  overscroll-behavior: none;
}

.app-shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.8rem;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  gap: 0.4rem;
}

.header h1 {
  font-family: 'Source Serif 4', serif;
  font-size: 1.05rem;
  font-weight: 700;
  white-space: nowrap;
}

.file-row { display: flex; align-items: center; gap: 0.4rem; min-width: 0; }

.file-name {
  font-size: 0.72rem;
  color: var(--text-light);
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.file-btn {
  padding: 0.35rem 0.65rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--card-bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  white-space: nowrap;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.file-btn:active { background: var(--bg); }
.file-input { display: none; }

/* NO FILE */
.no-file {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem 1.5rem;
}

.no-file .icon { font-size: 3rem; margin-bottom: 0.8rem; }

.no-file h2 {
  font-family: 'Source Serif 4', serif;
  font-size: 1.15rem;
  margin-bottom: 0.4rem;
}

.no-file p { color: var(--text-light); font-size: 0.85rem; margin-bottom: 1rem; }

.no-file code {
  display: block;
  text-align: left;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.7rem;
  font-size: 0.7rem;
  color: var(--text-light);
  max-width: 280px;
  white-space: pre;
  overflow-x: auto;
  line-height: 1.4;
}

/* STATS */
.stats-bar {
  display: flex;
  justify-content: center;
  gap: 1.2rem;
  padding: 0.45rem 0.6rem;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.stat { display: flex; align-items: center; gap: 0.25rem; }
.stat-num { font-weight: 700; font-size: 0.95rem; }
.stat-label { color: var(--text-light); font-size: 0.7rem; }
.stat-known .stat-num { color: var(--green); }
.stat-left .stat-num { color: var(--accent); }

.progress-wrap { height: 3px; background: var(--border); flex-shrink: 0; }
.progress-fill { height: 100%; background: var(--green); transition: width 0.4s; border-radius: 0 2px 2px 0; }

/* TOOLBAR */
.toolbar {
  padding: 0.5rem 0.8rem;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.search-input {
  width: 100%;
  padding: 0.45rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  background: var(--card-bg);
  color: var(--text);
  outline: none;
  -webkit-appearance: none;
}

.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-light); }

.filter-row { display: flex; justify-content: center; gap: 0.35rem; }

.filter-btn {
  padding: 0.28rem 0.8rem;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: var(--card-bg);
  color: var(--text-light);
  font-family: 'Nunito', sans-serif;
  font-size: 0.78rem;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.filter-btn:active { opacity: 0.7; }
.filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

/* CARD AREA */
.card-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.3rem 0.8rem;
  min-height: 0;
  overflow: hidden;
}

.card-counter { font-size: 0.75rem; color: var(--text-light); margin-bottom: 0.3rem; flex-shrink: 0; }

.flashcard-container {
  perspective: 1000px;
  width: 100%;
  max-width: 400px;
  flex: 1;
  max-height: 220px;
  touch-action: pan-x;
}

.flashcard {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  transform-style: preserve-3d;
}

.flashcard.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  border: 1px solid var(--border);
  box-shadow: 0 3px 14px var(--shadow);
}

.card-front { background: var(--card-bg); }
.card-back { background: var(--card-flip); transform: rotateY(180deg); }

.card-word {
  font-family: 'Source Serif 4', serif;
  font-size: 1.9rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  text-align: center;
  word-break: break-word;
}

.card-transcript { font-size: 0.95rem; color: var(--accent); font-weight: 600; }

.card-hint { font-size: 0.7rem; color: var(--text-light); margin-top: auto; }

.card-translation {
  font-family: 'Source Serif 4', serif;
  font-size: 1.6rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  text-align: center;
  word-break: break-word;
}

.card-back .card-word { font-size: 1rem; color: var(--text-light); margin-bottom: 0.15rem; }
.card-back .card-transcript { font-size: 0.85rem; }

/* CONTROLS */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.9rem;
  padding: 0.6rem 0;
  flex-shrink: 0;
}

.ctrl-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
  color: var(--text);
  -webkit-appearance: none;
  touch-action: manipulation;
  transition: transform 0.12s;
}

.ctrl-btn:active { transform: scale(0.9); }
.ctrl-btn.know { border-color: var(--green); color: var(--green); }
.ctrl-btn.know:active { background: var(--green); color: #fff; }
.ctrl-btn.skip { border-color: var(--accent); color: var(--accent); }
.ctrl-btn.skip:active { background: var(--accent); color: #fff; }
.ctrl-btn.speak { border-color: var(--blue); color: var(--blue); }
.ctrl-btn.speak:active { background: var(--blue); color: #fff; }
.ctrl-btn.prev { font-size: 1.05rem; }

/* BOTTOM */
.bottom-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.3rem 0.8rem 0.5rem;
  flex-shrink: 0;
}

.reset-btn {
  padding: 0.35rem 0.9rem;
  border: 1px solid var(--accent);
  border-radius: 8px;
  background: transparent;
  color: var(--accent);
  font-family: 'Nunito', sans-serif;
  font-size: 0.75rem;
  -webkit-appearance: none;
  touch-action: manipulation;
}

.reset-btn:active { background: var(--accent); color: #fff; }

.kbd-hint {
  text-align: center;
  font-size: 0.65rem;
  color: var(--text-light);
  flex-shrink: 0;
  padding: 0.15rem;
}

.kbd {
  display: inline-block;
  padding: 0.05rem 0.25rem;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: var(--card-bg);
  font-family: monospace;
  font-size: 0.6rem;
}

.empty-state { text-align: center; padding: 1.5rem; color: var(--text-light); }
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.4rem; }

.hidden { display: none !important; }

/* Hide kbd on touch */
@media (hover: none) and (pointer: coarse) { .kbd-hint { display: none; } }

/* Small phones */
@media (max-height: 680px) {
  .flashcard-container { max-height: 160px; }
  .card-word { font-size: 1.6rem; }
  .card-translation { font-size: 1.35rem; }
  .controls { padding: 0.4rem 0; gap: 0.7rem; }
  .ctrl-btn { width: 44px; height: 44px; font-size: 1.1rem; }
  .toolbar { padding: 0.35rem 0.8rem; gap: 0.25rem; }
  .stats-bar { padding: 0.3rem; gap: 0.8rem; }
  .card-counter { margin-bottom: 0.2rem; }
}

/* Tall phones */
@media (min-height: 850px) {
  .flashcard-container { max-height: 280px; }
  .card-word { font-size: 2.3rem; }
  .card-translation { font-size: 1.9rem; }
  .ctrl-btn { width: 56px; height: 56px; font-size: 1.4rem; }
  .controls { gap: 1.1rem; }
}

/* Desktop hover */
@media (min-width: 768px) {
  .flashcard-container { max-height: 300px; }
  .ctrl-btn:hover { transform: scale(1.08); box-shadow: 0 4px 12px var(--shadow-strong); }
  .ctrl-btn.know:hover { background: var(--green); color: #fff; }
  .ctrl-btn.skip:hover { background: var(--accent); color: #fff; }
  .ctrl-btn.speak:hover { background: var(--blue); color: #fff; }
  .reset-btn:hover { background: var(--accent); color: #fff; }
}
</style>
</head>
<body>
<div class="app-shell">

  <div class="header">
    <h1>🇵🇱 Флешкартки</h1>
    <div class="file-row">
      <button class="file-btn" id="loadFileBtn">📂 Файл</button>
      <input type="file" class="file-input" id="fileInput" accept=".json">
      <span class="file-name" id="fileName"></span>
    </div>
  </div>

  <div id="noFileState" class="no-file">
    <div class="icon">📚</div>
    <h2>Обери JSON файл зі словами</h2>
    <p>Формат:</p>
    <code>[{
  "id": "abc123",
  "word": "cześć",
  "transcription": "чешьчь",
  "translation": "привіт"
}]</code>
  </div>

  <div id="appMain" class="hidden" style="display:none;flex-direction:column;flex:1;min-height:0;">
    <div class="stats-bar">
      <div class="stat stat-known"><span class="stat-num" id="knownCount">0</span><span class="stat-label">вивчено</span></div>
      <div class="stat stat-left"><span class="stat-num" id="leftCount">0</span><span class="stat-label">лишилось</span></div>
      <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">всього</span></div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressBar" style="width:0%"></div></div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Пошук...">
      <div class="filter-row">
        <button class="filter-btn active" data-filter="all">Усі</button>
        <button class="filter-btn" data-filter="new">Нові</button>
        <button class="filter-btn" data-filter="known">Вивчені</button>
      </div>
    </div>

    <div class="card-area" id="cardArea">
      <div class="card-counter" id="cardCounter"></div>
      <div class="flashcard-container" id="flashcardContainer">
        <div class="flashcard" id="flashcard">
          <div class="card-face card-front">
            <div class="card-word" id="frontWord"></div>
            <div class="card-transcript" id="frontTranscript"></div>
            <div class="card-hint">натисни → переклад</div>
          </div>
          <div class="card-face card-back">
            <div class="card-translation" id="backTranslation"></div>
            <div class="card-word" id="backWord"></div>
            <div class="card-transcript" id="backTranscript"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="controls" id="controls">
      <button class="ctrl-btn prev" id="btnPrev">◀</button>
      <button class="ctrl-btn speak" id="btnSpeak">🔊</button>
      <button class="ctrl-btn skip" id="btnSkip">✗</button>
      <button class="ctrl-btn know" id="btnKnow">✓</button>
    </div>

    <div class="kbd-hint">
      <kbd class="kbd">←</kbd> назад
      <kbd class="kbd">Пробіл</kbd> перевернути
      <kbd class="kbd">→</kbd> далі
      <kbd class="kbd">Enter</kbd> знаю
      <kbd class="kbd">S</kbd> вимова
    </div>

    <div class="bottom-bar">
      <button class="reset-btn" id="resetBtn">Скинути прогрес</button>
    </div>
  </div>

</div>

<script>
let words=[], filteredWords=[], currentFilter='all', currentIndex=0, known=new Set(), needsShuffle=true;
const SK='polishCards_known';

function loadProgress(){try{const s=localStorage.getItem(SK);if(s)known=new Set(JSON.parse(s))}catch(e){}}
function saveProgress(){try{localStorage.setItem(SK,JSON.stringify([...known]))}catch(e){}}

function handleFile(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=function(e){
    try{
      const d=JSON.parse(e.target.result);
      if(!Array.isArray(d)||!d.length||!d[0].id||!d[0].word||!d[0].translation)return;
      words=d;
      document.getElementById('fileName').textContent=file.name+' · '+words.length;
      document.getElementById('noFileState').classList.add('hidden');
      const a=document.getElementById('appMain');a.classList.remove('hidden');a.style.display='flex';
      currentIndex=0;needsShuffle=true;
      updateFilteredWords();renderCard();updateStats();
    }catch(er){}
  };
  r.readAsText(file);
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function updateFilteredWords(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  let l=words.map(w=>({...w}));
  if(currentFilter==='new')l=l.filter(w=>!known.has(w.id));
  else if(currentFilter==='known')l=l.filter(w=>known.has(w.id));
  if(q)l=l.filter(w=>w.word.toLowerCase().includes(q)||w.translation.toLowerCase().includes(q)||(w.transcription&&w.transcription.toLowerCase().includes(q)));
  if(needsShuffle){shuffle(l);needsShuffle=false}
  filteredWords=l;
  if(currentIndex>=filteredWords.length)currentIndex=Math.max(0,filteredWords.length-1);
}

function renderCard(){
  const fc=document.getElementById('flashcard');fc.classList.remove('flipped');
  if(!filteredWords.length){
    document.getElementById('flashcardContainer').style.display='none';
    document.getElementById('controls').style.display='none';
    document.getElementById('cardCounter').innerHTML=
      currentFilter==='known'?'<div class="empty-state"><div class="emoji">📚</div>Немає вивчених</div>'
      :currentFilter==='new'?'<div class="empty-state"><div class="emoji">🎉</div>Все вивчено!</div>'
      :'<div class="empty-state"><div class="emoji">🔍</div>Не знайдено</div>';
    return;
  }
  document.getElementById('flashcardContainer').style.display='';
  document.getElementById('controls').style.display='';
  const w=filteredWords[currentIndex];
  document.getElementById('frontWord').textContent=w.word;
  document.getElementById('frontTranscript').textContent=w.transcription?'['+w.transcription+']':'';
  document.getElementById('backTranslation').textContent=w.translation;
  document.getElementById('backWord').textContent=w.word;
  document.getElementById('backTranscript').textContent=w.transcription?'['+w.transcription+']':'';
  document.getElementById('cardCounter').textContent=(currentIndex+1)+' / '+filteredWords.length;
}

function flipCard(){document.getElementById('flashcard').classList.toggle('flipped')}

function nextCard(){
  if(!filteredWords.length)return;
  const w=filteredWords[currentIndex];
  if(currentFilter==='known'){
    known.delete(w.id);saveProgress();updateStats();
    filteredWords.splice(currentIndex,1);
    if(!filteredWords.length)currentIndex=0;
    else if(currentIndex>=filteredWords.length)currentIndex=0;
  }else if(currentFilter==='all'&&known.has(w.id)){
    known.delete(w.id);saveProgress();updateStats();
    currentIndex=(currentIndex+1)%filteredWords.length;
  }else{currentIndex=(currentIndex+1)%filteredWords.length}
  renderCard();
}

function prevCard(){
  if(!filteredWords.length)return;
  currentIndex=(currentIndex-1+filteredWords.length)%filteredWords.length;
  renderCard();
}

function markKnown(){
  if(!filteredWords.length)return;
  const w=filteredWords[currentIndex];
  if(currentFilter==='known'){currentIndex=(currentIndex+1)%filteredWords.length}
  else{
    const was=known.has(w.id);was?known.delete(w.id):known.add(w.id);
    saveProgress();updateStats();
    if(!was&&currentFilter==='new'){
      filteredWords.splice(currentIndex,1);
      if(!filteredWords.length)currentIndex=0;
      else if(currentIndex>=filteredWords.length)currentIndex=0;
    }else{currentIndex=(currentIndex+1)%filteredWords.length}
  }
  renderCard();
}

function updateStats(){
  const t=words.length,k=words.filter(w=>known.has(w.id)).length;
  document.getElementById('knownCount').textContent=k;
  document.getElementById('leftCount').textContent=t-k;
  document.getElementById('totalCount').textContent=t;
  document.getElementById('progressBar').style.width=t?(k/t*100).toFixed(1)+'%':'0%';
}

function resetProgress(){
  known.clear();saveProgress();currentIndex=0;needsShuffle=true;
  updateFilteredWords();renderCard();updateStats();
}

function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);u.lang='pl-PL';u.rate=0.85;
  const v=window.speechSynthesis.getVoices(),p=v.find(x=>x.lang.startsWith('pl'));
  if(p)u.voice=p;window.speechSynthesis.speak(u);
}

function speakCurrent(){if(filteredWords.length)speak(filteredWords[currentIndex].word)}

function init(){
  loadProgress();
  const fi=document.getElementById('fileInput');
  document.getElementById('loadFileBtn').addEventListener('click',()=>fi.click());
  fi.addEventListener('change',function(){if(this.files[0])handleFile(this.files[0])});

  document.getElementById('searchInput').addEventListener('input',function(){
    currentIndex=0;needsShuffle=true;updateFilteredWords();renderCard();
  });

  document.querySelectorAll('.filter-btn').forEach(b=>{
    b.addEventListener('click',function(){
      document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
      this.classList.add('active');currentFilter=this.dataset.filter;
      currentIndex=0;needsShuffle=true;updateFilteredWords();renderCard();
    });
  });

  document.getElementById('btnPrev').addEventListener('click',prevCard);
  document.getElementById('btnSpeak').addEventListener('click',speakCurrent);
  document.getElementById('btnSkip').addEventListener('click',nextCard);
  document.getElementById('btnKnow').addEventListener('click',markKnown);

  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT')return;
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='ArrowDown'){e.preventDefault();flipCard()}
    else if(e.code==='ArrowRight')nextCard();
    else if(e.code==='ArrowLeft')prevCard();
    else if(e.code==='Enter')markKnown();
    else if(e.code==='KeyS')speakCurrent();
  });

  const rb=document.getElementById('resetBtn');let rp=false;
  rb.addEventListener('click',function(){
    if(!rp){rp=true;this.textContent='Точно? Ще раз';this.style.background='var(--accent)';this.style.color='#fff';
      setTimeout(()=>{rp=false;this.textContent='Скинути прогрес';this.style.background='';this.style.color=''},3000);
    }else{resetProgress();rp=false;this.textContent='Скинуто!';this.style.background='var(--green)';this.style.color='#fff';
      setTimeout(()=>{this.textContent='Скинути прогрес';this.style.background='';this.style.color=''},1500);
    }
  });

  if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices()}

  let tx=0,sw=false;const cc=document.getElementById('flashcardContainer');
  cc.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;sw=false},{passive:true});
  cc.addEventListener('touchmove',e=>{if(Math.abs(e.touches[0].clientX-tx)>20)sw=true},{passive:true});
  cc.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d>0?prevCard():nextCard()}},{passive:true});
  cc.addEventListener('click',()=>{if(!sw)flipCard();sw=false});

  document.body.addEventListener('dragover',e=>e.preventDefault());
  document.body.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.json'))handleFile(f)});
}
document.addEventListener('DOMContentLoaded',init);
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}
</script>
</body>
</html>
